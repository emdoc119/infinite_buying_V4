<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시흥 은행동 초등 방학 학원 모아보기</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="시흥 은행동 근처 초등학생 방학 특강, 몰입 캠프, 영어, 수영, 축구 등 학원 및 교습소 후기와 정보를 한눈에 비교하세요.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-content">
                <div class="logo">
                    <i class="ph-fill ph-student"></i>
                    <h1>은행동 방학 <span>학원탐색</span></h1>
                </div>
                <p class="subtitle">초등학생을 위한 완벽한 방학 준비, 여기서 시작하세요.</p>
                
                <div class="search-container">
                    <div class="region-selector">
                        <select id="regionSelect">
                            <option value="시흥 은행동">시흥 은행동</option>
                            <option value="부천 옥길동">부천 옥길동</option>
                            <option value="광명시">광명시</option>
                        </select>
                    </div>
                    <i class="ph ph-magnifying-glass search-icon"></i>
                    <input type="text" id="searchInput" placeholder="학원명, 과목, 키워드로 검색해보세요">
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Categories -->
            <section class="category-section">
                <h2>어떤 학원을 찾으시나요?</h2>
                <div class="category-filters" id="categoryFilters">
                    <button class="filter-btn active" data-category="all">전체보기</button>
                    <button class="filter-btn" data-category="favorites">❤️ 내 즐겨찾기</button>
                    <button class="filter-btn" data-category="영어">🔤 영어</button>
                    <button class="filter-btn" data-category="수영">🏊 수영</button>
                    <button class="filter-btn" data-category="축구">⚽ 축구</button>
                    <button class="filter-btn" data-category="수학">📐 수학</button>
                    <button class="filter-btn" data-category="코딩">💻 코딩</button>
                </div>
            </section>

            <!-- Grid List -->
            <section class="academy-list" id="academyList">
                <!-- Data will be injected here via JS -->
            </section>
        </main>
    </div>

    <!-- Modal for Academy Details -->
    <div class="modal-overlay" id="academyModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal"><i class="ph ph-x"></i></button>
            <div id="modalBody">
                <!-- Modal content injected via JS -->
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
